services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: personal_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/personal_manager
      PORT: 3001
      NODE_ENV: production
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:3001/api/auth/callback}
      AI_BASE_URL: ${AI_BASE_URL:-http://host.docker.internal:1234/v1}
      AI_MODEL: ${AI_MODEL:-google/gemma-4-e4b}
      AI_API_KEY: ${AI_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - pdf_data:/app/backend/pdfs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
      - "1420:1420"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/personal_manager
      PORT: 3001
      NODE_ENV: development
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:3001/api/auth/callback}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/backend/src
      - ./backend/prisma:/app/backend/prisma
      - ./frontend/src:/app/frontend/src
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app
    restart: unless-stopped
    profiles: ["https"]

  backup:
    image: postgres:16-alpine
    profiles: ["manual"]
    environment:
      PGPASSWORD: postgres
      BACKUP_DIR: /backups
    volumes:
      - ./scripts/backup.sh:/usr/local/bin/backup.sh
      - ./backups:/backups
      - postgres_data:/var/lib/postgresql/data:ro
    entrypoint: ["sh", "/usr/local/bin/backup.sh"]
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  pdf_data:
